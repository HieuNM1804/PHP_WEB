services:
  web:
    build: .
    environment:
      APP_BASE_URL: /
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: web
      DB_USER: gs25_user
      DB_PASS: gs25_pass
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/var/www/html/assets/uploads

  db:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: web
      MYSQL_USER: gs25_user
      MYSQL_PASSWORD: gs25_pass
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./docker/mysql/init/03-product-images.sql:/docker-entrypoint-initdb.d/03-product-images.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:5
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: gs25_user
      PMA_PASSWORD: gs25_pass
      UPLOAD_LIMIT: 64M
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  uploads_data:
